<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container mt-5">
    <a href="{% url 'job_list' %}" class="btn btn-secondary mb-3">← Powrót do listy</a>

    <div class="card mb-4">
        <div class="card-body">
            <h1 class="card-title">{{ offer.title }}</h1>
            <p class="card-text">{{ offer.description|linebreaks }}</p>
        </div>
    </div>

    <h2>Ranking Kandydatów</h2>
    <table class="table table-striped mt-3">
        <thead class="table-dark">
            <tr>
                <th>Imię i Nazwisko</th>
                <th>Dopasowanie (%)</th>
                <th>Plik CV</th>
            </tr>
        </thead>
        <tbody>
            {% for candidate in candidates %}
            <tr>
                <td>{{ candidate.full_name }}</td>
                <td>
                    <div class="progress" style="height: 25px;">
                        <div class="progress-bar {% if candidate.match_score > 70 %}bg-success{% elif candidate.match_score > 40 %}bg-warning{% else %}bg-danger{% endif %}"
                             role="progressbar"
                             style="width: {{ candidate.match_score }}%;">
                             {{ candidate.match_score }}%
                        </div>
                    </div>
                </td>
                <td><a href="{{ candidate.cv_file.url }}" target="_blank">Pobierz PDF</a></td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="text-center">Brak kandydatów na to stanowisko.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
