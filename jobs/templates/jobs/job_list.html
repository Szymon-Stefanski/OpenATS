<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container mt-5">
    <h1>Aktywne rekrutacje (OpenATS)</h1>
    <div class="list-group mt-4">
        {% for offer in offers %}
            <a href="{% url 'job_detail' offer.pk %}" class="list-group-item list-group-item-action">
                {{ offer.title }} <small class="text-muted">- {{ offer.created_at|date:"d.m.Y" }}</small>
            </a>
        {% endfor %}
    </div>
</div>
